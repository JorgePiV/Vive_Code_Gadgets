<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone Comparator | Jorge Pico Vela</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #00f7ff;
            --accent-purple: #bc13fe;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }
        nav h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        nav h1 span { color: var(--accent-blue); }
        nav ul { list-style: none; display: flex; gap: 2rem; margin: 0; padding: 0; align-items: center; }
        nav a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        nav a:hover { color: var(--accent-blue); text-shadow: 0 0 10px var(--accent-blue); }
        .nav-link-external { color: var(--text-muted); border-bottom: 1px solid transparent; padding-bottom: 2px; }
        .nav-link-external:hover { color: var(--text-main); border-bottom-color: var(--text-main); text-shadow: none; }

        /* --- GLOBAL SECTIONS --- */
        main { flex: 1; padding: 5rem 5%; max-width: 1000px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        h2 { font-size: 2rem; margin-bottom: 1rem; border-left: 3px solid var(--accent-blue); padding-left: 1rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Buttons */
        .btn {
            display: inline-block; padding: 10px 25px; border-radius: 6px;
            text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid var(--accent-blue); color: var(--text-main);
            transition: all 0.3s;
            cursor: pointer;
            background: transparent;
        }
        .btn:hover { background: var(--accent-blue); color: #000; box-shadow: 0 0 15px rgba(0, 247, 255, 0.4); }
        .btn-secondary { border-color: #333; color: var(--text-muted); }
        .btn-secondary:hover { background: #222; color: var(--text-main); box-shadow: none; border-color: #555; }

        /* --- CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .card {
            background: var(--card-bg); padding: 1.5rem; border-radius: 8px;
            border: 1px solid #222; transition: transform 0.3s, border-color 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(5px);
            background: rgba(17, 17, 17, 0.85); 
        }
        .card:hover { transform: translateY(-3px); border-color: var(--accent-blue); }
        .card h3 { margin: 0 0 0.2rem 0; font-size: 1.2rem; color: var(--text-main); }
        .card .date { font-size: 0.85rem; color: var(--accent-purple); display: block; margin-bottom: 1rem; font-weight: bold; }

        /* --- TIMEZONE TOOL STYLES --- */
        .tools-controls { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; background: rgba(17, 17, 17, 0.85); padding: 1.5rem; border-radius: 8px; border: 1px solid #222; backdrop-filter: blur(5px); }
        .control-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; width: 100%; }
        
        .select-dark { 
            background: #1a1a1a; color: var(--text-main); border: 1px solid #333; 
            padding: 10px 15px; border-radius: 6px; font-size: 0.9rem; outline: none;
            transition: border-color 0.3s; flex-grow: 1; max-width: 300px;
        }
        .select-dark:focus { border-color: var(--accent-blue); }
        
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* Estilos del Slider Interactivo */
        .time-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            max-width: 300px;
            height: 6px;
            background: #333;
            border-radius: 5px;
            outline: none;
            transition: background 0.3s;
        }
        .time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.6);
            transition: transform 0.1s;
        }
        .time-slider::-webkit-slider-thumb:active { transform: scale(1.2); }

        .btn-remove { border-color: rgba(255, 77, 77, 0.5); color: #ff4d4d; padding: 6px 15px; font-size: 0.8rem; width: 100%; margin-top: 1rem; }
        .btn-remove:hover { background: rgba(255, 77, 77, 0.1); border-color: #ff4d4d; color: #ff4d4d; box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }

        /* --- DUAL CLOCK DISPLAY (ANALOG + DIGITAL) --- */
        .clock-display-wrapper { display: flex; align-items: center; gap: 20px; margin: 10px 0; padding: 15px; background: rgba(255, 255, 255, 0.02); border-radius: 8px; border: 1px solid #1a1a1a; }
        .time-display { font-size: 2rem; font-weight: bold; color: var(--text-main); font-variant-numeric: tabular-nums; letter-spacing: 1px; }

        /* Estilos del Reloj Analógico */
        .analog-clock { width: 70px; height: 70px; border: 2px solid var(--accent-blue); border-radius: 50%; position: relative; background: radial-gradient(circle, #1a1a1a 0%, var(--card-bg) 100%); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); flex-shrink: 0; }
        .hand { position: absolute; bottom: 50%; transform-origin: bottom center; border-radius: 4px; transition: transform 0.05s cubic-bezier(0.4, 2.08, 0.55, 0.44); }
        .hour-hand { width: 4px; height: 20px; left: calc(50% - 2px); background: var(--text-main); z-index: 3; }
        .minute-hand { width: 3px; height: 28px; left: calc(50% - 1.5px); background: var(--text-muted); z-index: 2; }
        .second-hand { width: 2px; height: 32px; left: calc(50% - 1px); background: var(--accent-purple); z-index: 4; }
        .center-dot { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-blue); transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 0 5px rgba(0, 247, 255, 0.5); }

        footer { text-align: center; padding: 2rem; border-top: 1px solid #222; color: var(--text-muted); font-size: 0.85rem; background: var(--bg-color); }

        @media (max-width: 768px) {
            nav ul { display: none; }
            .select-dark, .time-slider { max-width: none; }
            .clock-display-wrapper { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <h1>Jorge<span>.</span>Pico</h1>
        <ul>
            <li><a href="index.html">← Back to Portfolio</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="https://www.linkedin.com/in/jorge-pico-vela-18202b1ba" target="_blank" class="nav-link-external">LinkedIn</a></li>
            <li><a href="attractors.html">Chaos Lab</a></li>
        </ul>
    </nav>

    <main>
        <h2>Timezone Comparator</h2>
        <p style="color: var(--text-muted);">A global synchronization tool. Drag the slider to simulate any time of the day and plan cross-timezone events.</p>
        
        <div class="tools-controls">
            <div class="control-row">
                <input list="timezone-list" id="cityInput" class="select-dark" placeholder="Type a country or city..." autocomplete="off">
                <datalist id="timezone-list"></datalist>
                <button onclick="addCity()" class="btn">Add Clock</button>
            </div>
            
            <hr style="width: 100%; border-color: #333; margin: 0.5rem 0;">

            <div class="control-row">
                <span style="color: var(--text-muted); font-size: 0.9rem;">Simulate Time:</span>
                <input type="time" id="manualTimeInput" class="select-dark" onchange="setManualTimeFromInput()" style="max-width: 120px;">
                <input type="range" id="timeSlider" class="time-slider" min="0" max="1439" value="720" oninput="setManualTimeFromSlider()">
                <button onclick="resetTime()" class="btn btn-secondary" id="resetTimeBtn" style="visibility: hidden; border-color: var(--accent-purple); color: var(--accent-purple);">Reset</button>
            </div>
        </div>

        <div id="clocks" class="grid"></div>
    </main>

    <footer>
        <p>© 2026 Jorge Pico Vela.</p>
    </footer>

    <div id="atractor-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.6; pointer-events: none;"></div>

<script>
    const selectedCities = new Map(); 
    const timezones = Intl.supportedValuesOf('timeZone');
    
    // VARIABLES PARA EL SIMULADOR DE TIEMPO
    let isManualTime = false;
    let manualDate = null;
    
    const countryToTz = {
        "Ecuador": ["America/Guayaquil", "Pacific/Galapagos"],
        "Colombia": ["America/Bogota"],
        "United States": ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "Pacific/Honolulu"],
        "Spain": ["Europe/Madrid", "Atlantic/Canary"],
        "United Kingdom": ["Europe/London"],
        "Japan": ["Asia/Tokyo"],
        "Saudi Arabia": ["Asia/Riyadh"],
        "Austria": ["Europe/Vienna"], 
        "UAE": ["Asia/Dubai"],
        "Germany": ["Europe/Berlin"],
        "France": ["Europe/Paris"],
        "Italy": ["Europe/Rome"],
        "Australia": ["Australia/Sydney", "Australia/Melbourne", "Australia/Perth"],
        "Brazil": ["America/Sao_Paulo", "America/Bahia"],
        "Argentina": ["America/Argentina/Buenos_Aires", "America/Argentina/Cordoba"],
        "Mexico": ["America/Mexico_City", "America/Monterrey", "America/Cancun"],
        "Peru": ["America/Lima"],
        "Chile": ["America/Santiago", "Pacific/Easter"],
        "China": ["Asia/Shanghai"],
        "India": ["Asia/Kolkata"]
    };

    const customAliases = {
        "Saudi Arabia - Jeddah": "Asia/Riyadh", 
        "Ecuador - Quito": "America/Guayaquil", 
        "Colombia - Medellin": "America/Bogota" 
    };

    const tzToCountry = {};
    for (const [country, zones] of Object.entries(countryToTz)) {
        zones.forEach(z => tzToCountry[z] = country);
    }

    const textToTz = new Map();

    function populateTimezones() {
        const datalist = document.getElementById("timezone-list");
        
        timezones.forEach(tz => {
            let country = tzToCountry[tz] || tz.split('/')[0]; 
            let city = tz.split('/').pop().replace(/_/g, ' '); 
            let displayText = `${country} - ${city}`;
            textToTz.set(displayText, tz);

            const option = document.createElement("option");
            option.value = displayText; 
            datalist.appendChild(option);
        });

        for (const [aliasName, tzValue] of Object.entries(customAliases)) {
            textToTz.set(aliasName, tzValue);
            const option = document.createElement("option");
            option.value = aliasName;
            datalist.appendChild(option);
        }
    }

    function saveToLocalStorage() {
        const dataToSave = Array.from(selectedCities.entries());
        localStorage.setItem("savedTimezones", JSON.stringify(dataToSave));
    }

    // --- NUEVAS FUNCIONES PARA EL SLIDER INTERACTIVO ---

    // Cuando el usuario mueve el slider
    function setManualTimeFromSlider() {
        const totalMinutes = document.getElementById("timeSlider").value;
        const h = Math.floor(totalMinutes / 60);
        const m = totalMinutes % 60;
        
        // Actualizamos el input de texto para que coincida
        const timeString = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        document.getElementById("manualTimeInput").value = timeString;
        
        applyManualTime(h, m);
    }

    // Cuando el usuario escribe la hora directamente
    function setManualTimeFromInput() {
        const timeVal = document.getElementById("manualTimeInput").value;
        if (!timeVal) {
            resetTime();
            return;
        }
        
        const [h, m] = timeVal.split(':').map(Number);
        
        // Actualizamos el slider para que coincida
        document.getElementById("timeSlider").value = (h * 60) + m;
        
        applyManualTime(h, m);
    }

    // Aplica la hora a las tarjetas
    function applyManualTime(h, m) {
        isManualTime = true;
        manualDate = new Date(); // Usamos el día de hoy como base
        manualDate.setHours(h, m, 0, 0);
        
        document.getElementById("resetTimeBtn").style.visibility = "visible";
        
        // Detiene la transición css para que las agujas giren instantáneamente con el dedo
        document.querySelectorAll('.hand').forEach(hand => {
            hand.style.transition = 'none';
        });

        updateClocks();
    }

    function resetTime() {
        isManualTime = false;
        manualDate = null;
        document.getElementById("manualTimeInput").value = "";
        document.getElementById("resetTimeBtn").style.visibility = "hidden";
        
        // Reactiva la transición natural del reloj
        document.querySelectorAll('.hand').forEach(hand => {
            hand.style.transition = 'transform 0.05s cubic-bezier(0.4, 2.08, 0.55, 0.44)';
        });

        updateClocks();
    }

    // --- FIN FUNCIONES DEL SLIDER ---

    function addCity() {
        const input = document.getElementById("cityInput");
        const displayText = input.value.trim();
        
        if (!displayText) return;

        const tz = textToTz.get(displayText);

        if (!tz) {
            alert("Please select a valid city from the list.");
            return;
        }

        const cityName = displayText.split(' - ')[1] || displayText;

        if (!selectedCities.has(tz)) {
            selectedCities.set(tz, cityName);
            createClockCard(tz, cityName);
            updateClocks();
            saveToLocalStorage();
            input.value = ""; 
        } else {
            alert("This timezone is already on the dashboard.");
        }
    }

    function removeCity(tz) {
        selectedCities.delete(tz);
        saveToLocalStorage();
        const card = document.getElementById(`card-${tz.replace(/\//g, '-')}`);
        if (card) {
            card.remove();
        }
    }

    function createClockCard(tz, cityName) {
        const container = document.getElementById("clocks");
        const safeTzId = tz.replace(/\//g, '-'); 

        const card = document.createElement("div");
        card.className = "card";
        card.id = `card-${safeTzId}`;

        card.innerHTML = `
            <div>
                <h3>${cityName}</h3>
                <span class="date" id="date-${safeTzId}">--</span>
            </div>
            
            <div class="clock-display-wrapper">
                <div class="analog-clock">
                    <div class="hand hour-hand" id="hour-${safeTzId}"></div>
                    <div class="hand minute-hand" id="min-${safeTzId}"></div>
                    <div class="hand second-hand" id="sec-${safeTzId}"></div>
                    <div class="center-dot"></div>
                </div>
                <div class="time-display" id="time-${safeTzId}">--:--:--</div>
            </div>

            <button class="btn btn-secondary btn-remove" onclick="removeCity('${tz}')">Remove Clock</button>
        `;

        container.appendChild(card);
    }

    function updateClocks() {
        const now = isManualTime ? manualDate : new Date();
        
        // Si no estamos en modo manual, movemos el slider automáticamente para que refleje la hora real
        if (!isManualTime) {
            const currentSliderVal = (now.getHours() * 60) + now.getMinutes();
            const slider = document.getElementById("timeSlider");
            // Solo lo actualizamos si el usuario no lo está tocando en ese momento
            if (document.activeElement !== slider) {
                slider.value = currentSliderVal;
            }
        }

        selectedCities.forEach((cityName, tz) => {
            const safeTzId = tz.replace(/\//g, '-');
            const timeDisplay = document.getElementById(`time-${safeTzId}`);
            const dateDisplay = document.getElementById(`date-${safeTzId}`);
            const hourHand = document.getElementById(`hour-${safeTzId}`);
            const minHand = document.getElementById(`min-${safeTzId}`);
            const secHand = document.getElementById(`sec-${safeTzId}`);
            
            if (timeDisplay) {
                const timeString = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
                }).format(now);
                timeDisplay.innerText = timeString;

                if (dateDisplay) {
                    const dateString = new Intl.DateTimeFormat('en-US', {
                        timeZone: tz, weekday: 'short', month: 'short', day: 'numeric'
                    }).format(now);
                    dateDisplay.innerText = `${dateString} • ${tz}`;
                }

                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz, hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false
                });
                
                let h = 0, m = 0, s = 0;
                formatter.formatToParts(now).forEach(part => {
                    if (part.type === 'hour') h = parseInt(part.value);
                    if (part.type === 'minute') m = parseInt(part.value);
                    if (part.type === 'second') s = parseInt(part.value);
                });

                h = h % 12; 
                
                const sDeg = s * 6;
                const mDeg = (m * 6) + (s * 0.1);
                const hDeg = (h * 30) + (m * 0.5);

                if (hourHand) hourHand.style.transform = `rotate(${hDeg}deg)`;
                if (minHand) minHand.style.transform = `rotate(${mDeg}deg)`;
                
                if (secHand) {
                    secHand.style.transform = `rotate(${sDeg}deg)`;
                    // Si simulamos el tiempo, el segundero se atenúa
                    secHand.style.opacity = isManualTime ? "0.2" : "1";
                }
            }
        });
    }

    setInterval(updateClocks, 1000);
    
    document.addEventListener("DOMContentLoaded", () => {
        populateTimezones();
        
        const savedData = localStorage.getItem("savedTimezones");
        
        if (savedData) {
            const parsedData = JSON.parse(savedData);
            if (parsedData.length > 0) {
                parsedData.forEach(([tz, cityName]) => {
                    selectedCities.set(tz, cityName);
                    createClockCard(tz, cityName);
                });
                updateClocks();
                return; 
            }
        }
        
        document.getElementById("cityInput").value = "Ecuador - Quito";
        addCity(); 
    });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const container = document.getElementById('atractor-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    let x = 5, y = 10, z = 10;
    let a = 35, b = 3, c = 28;
    const dt = 0.001; 
    const totalPoints = 40000; 

    const positions = new Float32Array(totalPoints * 3);
    const colors = new Float32Array(totalPoints * 3);
    const vectorPoints = [];

    function getViridisColor(t) {
        const hexColors = [
            {r: 68, g: 1, b: 84},    {r: 59, g: 82, b: 139},  
            {r: 33, g: 145, b: 140}, {r: 94, g: 201, b: 98},  
            {r: 253, g: 231, b: 37}  
        ];
        
        const scaled = t * (hexColors.length - 1);
        const idx = Math.floor(scaled);
        const frac = scaled - idx;

        if (idx >= hexColors.length - 1) {
            return { r: hexColors[4].r / 255, g: hexColors[4].g / 255, b: hexColors[4].b / 255 };
        }

        const c1 = hexColors[idx];
        const c2 = hexColors[idx + 1];
        
        return {
            r: (c1.r + (c2.r - c1.r) * frac) / 255,
            g: (c1.g + (c2.g - c1.g) * frac) / 255,
            b: (c1.b + (c2.b - c1.b) * frac) / 255
        };
    }

    for (let i = 0; i < totalPoints; i++) {
        let dx = (a * (y - x)) * dt;
        let dy = ((c - a) * x - x * z + c * y) * dt;
        let dz = (x * y - b * z) * dt;
        
        x += dx; y += dy; z += dz;

        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z - 20; 
        
        vectorPoints.push(new THREE.Vector3(x, y, z - 20));

        const ratio = i / totalPoints;
        const vColor = getViridisColor(ratio);
        
        colors[i * 3] = vColor.r;
        colors[i * 3 + 1] = vColor.g;
        colors[i * 3 + 2] = vColor.b;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.6 });
    const line = new THREE.Line(geometry, material);
    
    line.scale.set(0.8, 0.8, 0.8);
    scene.add(line);
    
    line.rotation.x = Math.PI / 2.2;
    line.rotation.y = -0.5;

    const sphereGeo = new THREE.SphereGeometry(0.5, 16, 16);
    const sphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const point = new THREE.Mesh(sphereGeo, sphereMat);
    
    const pointLight = new THREE.PointLight(0xffffff, 2, 50);
    point.add(pointLight);
    scene.add(point);

    camera.position.z = 45; 
    camera.position.x = -15;

    let currentIdx = 0;

    function animate() {
        requestAnimationFrame(animate);
        
        currentIdx = (currentIdx + 1.2) % totalPoints; 
        const p = vectorPoints[Math.floor(currentIdx)];
        
        point.position.set(p.x * 0.8, p.y * 0.8, p.z * 0.8);
        
        line.rotation.y = -0.5 + Math.sin(Date.now() * 0.0005) * 0.1;
        point.position.applyEuler(line.rotation);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
